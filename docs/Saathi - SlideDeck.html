at{font-size:19px;color:var(--ink);line-height:1.35}\n\n  /* ===== SLIDE 7 — PRODUCT-MARKET FIT ===== */\n  .pmf{display:flex;flex-direction:column;flex:1;justify-content:center;gap:26px}\n  .matrix{display:grid;grid-template-columns:1.5fr 1.1fr 1.25fr 1fr 1.1fr .8fr;border:1.5px solid var(--gray-200);border-radius:22px;overflow:hidden;background:#fff}\n  .matrix .mcell{padding:12px 14px;border-bottom:1.5px solid var(--gray-100);display:flex;align-items:center;min-height:74px}\n  .matrix .mcell:nth-child(n+31){border-bottom:none}\n  .matrix .mhead{font-family:'JetBrains Mono',monospace;font-size:var(--mhead-size,18px);font-weight:700;letter-spacing:.01em;text-transform:uppercase;color:var(--gray-500);background:var(--gray-50);min-height:100px;line-height:1.28}\n  .matrix .mhead.saathi{background:var(--navy);color:#fff}\n  .matrix .mhead:not(:first-child){justify-content:center;text-align:center}\n  .matrix .mcol-saathi{background:rgba(255,107,61,.06)}\n  .matrix .mcell:not(.rowlabel):not(.mhead){justify-content:center}\n  .matrix .rowlabel{font-size:20px;font-weight:600;color:var(--navy)}\n  .matrix .rowlabel.hl{border-left:6px solid var(--coral);color:var(--coral)}\n  .matrix .yes{color:var(--teal);font-size:28px;font-weight:800}\n  .matrix .no{color:var(--gray-300,#cfd5de);font-size:24px}\n  .matrix .partial{color:var(--amber);font-size:17px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.03em;text-transform:uppercase}\n  .matrix .note{color:var(--amber);font-size:15px;font-weight:600;line-height:1.25;text-align:center}\n  .pmf-punch{font-size:29px;line-height:1.4;font-weight:500;color:var(--ink);max-width:1560px}\n  .pmf-punch .hl{color:var(--coral);font-weight:700}\n\n  /* ===== SLIDE — THE TOOLS ===== */\n  .tools-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;flex:1;align-content:start}\n  .tcluster{border:1.5px solid var(--gray-200);border-radius:20px;background:#fff;padding:18px 24px 14px;display:flex;flex-direction:column}\n  .tcluster.span2{grid-column:span 2}\n  .tcluster.span3{grid-column:span 3}\n  .tcluster .tc-head{display:flex;align-items:center;gap:13px;padding-bottom:12px;border-bottom:1.5px solid var(--gray-100);margin-bottom:2px}\n  .tcluster .tc-ico{width:40px;height:40px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff}\n  .tcluster .tc-name{font-size:22px;font-weight:700;color:var(--navy);line-height:1.05}\n  .tcluster .tc-sub{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.05em;color:var(--gray-400);margin-top:2px;text-transform:uppercase}\n  .trow{display:flex;align-items:center;gap:14px;padding:8px 0}\n  .trow + .trow{border-top:1px solid var(--gray-100)}\n  .tlogo{width:38px;height:38px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:#fff;letter-spacing:-.02em}\n  .tlogo.img{background:#fff;border:1.5px solid var(--gray-200);padding:5px;overflow:hidden}\n  .tlogo.img.dark{background:#16243A;border-color:#16243A}\n  .tlogo.img img{width:100%;height:100%;object-fit:contain;display:block}\n  .trow .tt{font-size:19px;font-weight:700;color:var(--ink);line-height:1.15}\n  .trow .td{font-size:15px;color:var(--gray-500);line-height:1.2;margin-top:1px}\n  .trow .tt .tnote{font-weight:400;color:var(--gray-400);font-size:15px}\n  .tools-foot-note{margin-top:22px;font-size:21px;line-height:1.4;color:var(--gray-700);max-width:1560px}\n  .tools-foot-note b{color:var(--coral);font-weight:700}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- ============ SLIDE 1 — TITLE ============ -->\n  <section data-label=\"Title\" data-speaker-notes=\"Let's begin. Today isn't a product demo, it's a teardown. We're going to open up one real GenAI product, Saathi, a family health-memory app, and use it as a working case study for how a generative AI capstone project actually gets built end to end: problem, plan, tooling, code, safety, and fit. My core claim, which I want you to hold onto for the next 45 minutes, is this: the model call itself is maybe ten percent of the work. The other ninety percent, grounding, guardrails, state design, product framing, is what separates a weekend demo from something you'd trust with your own health data. So as we go slide by slide, keep asking one question: where exactly does the AI sit in this picture, and what's protecting it on either side? Let's start with the problem, because that's always where a real project should start, never with the tools.\">\n    <div class=\"slide-pad dark s-title\">\n      <div class=\"logo-row anim anim-1\">\n        <div class=\"logo-mark\">\n          <svg width=\"32\" height=\"32\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 21s-7-4.5-9.5-9A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6C19 16.5 12 21 12 21z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"logo-word\">Saathi<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"eyebrow anim anim-2\" style=\"margin-bottom:34px\">GENAI CAPSTONE PROJECT IMPLEMENTATION<\u002Fdiv>\n      <h1 class=\"title anim anim-3\">Building a <span class=\"hl\">trustworthy<\u002Fspan><br>GenAI product.<\u002Fh1>\n      <div class=\"sub anim anim-4\">Saathi is a family health-memory app. We'll use it to learn how a generative-AI product actually gets built, because the code is the easy part. The craft is everything around it.<\u002Fdiv>\n      <div class=\"ctx anim anim-5\">\n        <span>IITM BS · NPTEL<\u002Fspan><span class=\"sep\" style=\"opacity: 0\"><\u002Fspan><span style=\"opacity: 0\">Generative AI Capstone Project Implementation<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot on-dark\">\n      <div class=\"brand\">Team Null{Set}<\u002Fdiv>\n      <div>01 / 09<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SLIDE — THE TOOLS ============ -->\n  \n\n  <!-- ============ SLIDE 2 — THE PROBLEM ============ -->\n  <section data-label=\"The Problem\" data-speaker-notes=\"So, the problem, not the product. Every GenAI project I've seen go wrong started with somebody falling in love with a model capability first, then hunting for a problem to justify it. We're not doing that here. Look at this slide: three fragments. A lab portal that gives you a PDF and nothing else. A wearable app that shows trends but can never see your bloodwork. And your own memory, which is where the synthesis is supposed to happen, what was my cholesterol last year, and did it change after I started exercising? Nobody's memory is a reliable database. Quick show of hands, and be honest: how many of you, or your family, have sat in a waiting room trying to remember when your last blood test was, or scrolled through WhatsApp hunting for a PDF someone forwarded months ago? That's the problem. It's not exotic, and at its root it's not even a technical problem, it's a memory and retrieval problem for a person under mild stress. This matters pedagogically because it's the first checkpoint in any GenAI build: can you state the problem in one sentence without mentioning AI at all? If you can't, you're not ready to write a prompt yet. Saathi's one sentence is right there: a family's health story is scattered across apps, chats, and memory, and when it matters most, in front of a doctor, there is no single source of truth. Notice what this framing does not say. It doesn't say we need an LLM to summarize documents, or we need a chatbot. Those are solutions, and it's too early for solutions. Hold this fragment picture in your head, lab portal, wearable app, memory, because everything we build for the rest of this talk is in service of collapsing those three into one coherent, trustworthy place.\">\n    <div class=\"slide-pad\">\n      <div class=\"s-head\">\n        <div class=\"row anim anim-1\"><span class=\"kicker-num\">01<\u002Fspan><span class=\"eyebrow on-light\">The Problem<\u002Fspan><\u002Fdiv>\n        <h2 class=\"headline anim anim-2\">Start with a human problem,<br>not with the tools.<\u002Fh2>\n      <\u002Fdiv>\n\n      <div class=\"frag-grid\">\n        <div class=\"frag anim anim-3\">\n          <div class=\"ico\">🧪<\u002Fdiv>\n          <div class=\"lbl\">Lab portal<\u002Fdiv>\n          <div class=\"txt\">Reports trapped as PDFs across clinics<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"frag anim anim-4\">\n          <div class=\"ico\">⌚<\u002Fdiv>\n          <div class=\"lbl\">Wearable app<\u002Fdiv>\n          <div class=\"txt\">Trends siloed, never tied to results<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"frag anim anim-5\">\n          <div class=\"ico\">🧠<\u002Fdiv>\n          <div class=\"lbl\">Your memory<\u002Fdiv>\n          <div class=\"txt\">\"What was my cholesterol last year?\"<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"problem-punch anim anim-6\">A family's health story is scattered across wearable apps, whatsapp chats and memory. When it matters most, sitting across from a doctor -&nbsp;there's no single source of truth.<\u002Fdiv>\n\n    <\u002Fdiv>\n    <div class=\"foot\"><div class=\"brand\" style=\"opacity: 0\"><span class=\"dot\"><\u002Fspan> Null{Set}<\u002Fdiv><div>02 / 09<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SLIDE 3 — PROBLEM TO PLAN ============ -->\n  <section data-label=\"From Problem to Plan\" data-speaker-notes=\"Now we move from problem to plan, and this is the most important slide in the deck conceptually, because it's where I want to introduce grounding before we touch a line of code. Look at the left column: lab reports, wearable devices, and Strava for phone-only users who don't own a wearable. Three very different data shapes, a semi-structured PDF, a time series, and session data. In a classical ML course you'd engineer features from each separately and feed them into a model. That's not what's happening here. What's happening in the middle box, Saathi GenAI, correlates, grounds, guarded, is closer to Retrieval-Augmented Generation, or RAG. Who already has a working definition of RAG? Take an answer or two. For everyone else: instead of asking a language model to answer purely from what it learned during training, fixed and generic, you retrieve the specific, private facts relevant to this one question, this user's lipid panel, this user's last 28 days of sleep, and hand those facts to the model as context at the moment of the question. The model's job shrinks from know everything to reason cleanly over what it was just handed. That's grounding, the difference between asking a brilliant stranger with no access to your file, versus handing that stranger your file and saying only talk about what's in here. Why does this matter more here than almost anywhere else? Because this is health data. A model's parametric memory is a statistical average of the internet, it is emphatically not your father's cholesterol trend. Grounding is what converts a generic, confident-sounding model into a personal, evidence-bound copilot. Now look at the right column, personalised insights, answers from your data, visit-ready briefs. Notice each one is a product surface, not a model capability, that's deliberate, pick three or four surfaces and map retrieval and prompting specifically to each, rather than shipping one generic ask-me-anything box. Sit with this question as we move to tools: if grounding means retrieve the right facts and hand them to the model, what does retrieve mean, mechanically? How does a system find the right three sentences out of hundreds of pages of medical history? That's embeddings and vector search, exactly where we're going next.\">\n    <div class=\"slide-pad\">\n      <div class=\"s-head\">\n        <div class=\"row anim anim-1\"><span class=\"kicker-num\">02<\u002Fspan><span class=\"eyebrow on-light\">From Problem to Plan<\u002Fspan><\u002Fdiv>\n        <h2 class=\"headline anim anim-2\">Many signals in.<br>One clear answer out.<\u002Fh2>\n      <\u002Fdiv>\n\n      <div class=\"flow\">\n        <div class=\"flow-col anim anim-3\">\n          <div class=\"fc-label\">INPUT SIGNALS<\u002Fdiv>\n          <div class=\"flow-chip\">\n            <div class=\"fi\" style=\"background:var(--teal)\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n            <div><div class=\"ft\">Lab reports<\u002Fdiv><div class=\"fs\">Bloodwork, panels, scans<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"flow-chip\">\n            <div class=\"fi\" style=\"background:var(--blue)\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 12h-4l-3 9L9 3l-3 9H2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div><div class=\"ft\">Wearable Devices<\u002Fdiv><div class=\"fs\">Sleep, heart rate, activity trends<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"flow-chip\">\n            <div class=\"fi\" style=\"background:var(--coral)\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"13\" cy=\"4\" r=\"2\"><\u002Fcircle><path d=\"m9 21 2-4 3 1 1.5 3M7 13l3-4 3 2 2-3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div><div class=\"ft\">Strava<\u002Fdiv><div class=\"fs\">Activity tracking for phone-only users<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"flow-arrow anim anim-4\">→<\u002Fdiv>\n\n        <div class=\"flow-engine anim anim-4\">\n          <div class=\"eng\">\n            <svg width=\"44\" height=\"44\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v4M12 17v4M3 12h4M17 12h4\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><path d=\"m6.5 6.5 1.5 1.5M16 16l1.5 1.5M17.5 6.5 16 8M8 16l-1.5 1.5\"><\u002Fpath><\u002Fsvg>\n            <div class=\"eng-name\">Saathi GenAI<\u002Fdiv>\n            <div class=\"eng-sub\" style=\"width: 120px\">Correlates ·&nbsp;Grounds · Guarded<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"flow-arrow anim anim-6\">→<\u002Fdiv>\n\n        <div class=\"flow-col anim anim-5\">\n          <div class=\"fc-label\">SOLUTION SET<\u002Fdiv>\n          <div class=\"flow-chip\">\n            <div class=\"fi\" style=\"background:var(--navy)\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l1.9 5.7 6 .1-4.8 3.6 1.8 5.7L12 14.9l-4.9 3.2 1.8-5.7L4.1 8.8l6-.1z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div><div class=\"ft\">Personalised insights<\u002Fdiv><div class=\"fs\">Plain-language health stories for you or your entire family<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"flow-chip\">\n            <div class=\"fi\" style=\"background:var(--teal)\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div><div class=\"ft\">Answers from your data<\u002Fdiv><div class=\"fs\">Ask anything, always sourced<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"flow-chip\">\n            <div class=\"fi\" style=\"background:var(--blue)\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"8\" y=\"2\" width=\"8\" height=\"4\" rx=\"1\"><\u002Frect><path d=\"M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div><div class=\"ft\">Visit-ready briefs<\u002Fdiv><div class=\"fs\">Walk into a consult prepared<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><div class=\"brand\" style=\"opacity: 0\"><span class=\"dot\"><\u002Fspan> Null{Set}<\u002Fdiv><div>03 / 09<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection><section data-label=\"The Tools\" data-speaker-notes=\"This slide looks like a logo wall, but I want to use it as a tour through five real GenAI engineering decisions. Let's move fast on the boring-but-necessary parts and slow on the interesting ones. Core and Infra, quickly: built with Claude Desktop and Claude Design for brainstorming and interface design, VS Code for coding, Next.js 15 on the frontend, FastAPI as a serverless backend, Vercel for deployment, Supabase for database and auth. One meta point: AI tools were used to help build the AI product, that loop, using an LLM as a pair programmer to build a system that itself calls an LLM, is now completely normal and worth naming. Document Intelligence is our first real ML concept stop. Lab reports arrive as PDFs, sometimes scanned or photographed. LlamaParse handles raw parsing. The harder problem is reliably reading a value like 4.8 as an LDL number and not, say, a page number. Saathi runs a four-pass GPT-4o pipeline for this. Why four passes and not one? Single-shot extraction from a language model is not deterministic, ask it once you might get a good extraction, ask a subtly different way you might catch an error the first pass made. Running multiple passes and cross-checking across them is self-consistency, a known technique for pushing down error rates on extraction and reasoning tasks. Expensive in tokens, but for a health number a doctor might act on, worth it. Data Ingestion is mostly plumbing, Fitbit's OAuth2 API and equivalent adapters for other wearables and Strava, not glamorous, but getting consented, standing access to someone's data is a prerequisite before any AI layer can do anything. Now the center of gravity for this whole class: AI and Retrieval. Saathi routes model calls through OpenRouter and generates embeddings using OpenAI's text-embedding-3-small. An embedding takes a piece of text, a sentence from a lab report, a question, and turns it into a vector, a long list of numbers, positioned so that texts with similar meaning land close together in that space. LDL cholesterol is high and bad cholesterol levels are elevated end up near each other even without sharing exact words. Once everything is a vector, finding the most relevant facts becomes geometry, measure the angle between the question's vector and every stored fact's vector, that's cosine similarity, and pull back whichever facts have the smallest angle. That retrieval step feeds the grounding from the last slide. Discussion question: some of you have fine-tuned a model before, why do you think Saathi chose retrieval over fine-tuning on each family's data? Take answers. Core reasons: fine-tuning is slow to update, every new lab report would mean retraining, it risks baking private medical data into model weights, a real privacy problem if those weights ever leak, and retrieval is instantly updatable, upload a report, embed it, it's queryable in seconds. RAG is almost always the right first move for personal, frequently changing, sensitive data, fine-tuning earns its cost when you need to change a model's fundamental style or skill, not when it needs new facts. Last stop, Guardrails and Observability. The classifier here is GPT-4o-mini, not the larger model, a deliberate pattern, use a small cheap fast model for a narrow yes-or-no decision, is this a medical advice question, and reserve the larger model for generative work. LangSmith gives us tracing, a log of every prompt, every retrieved chunk, every response, every latency number. Language models are non-deterministic, so when something breaks in production you can't just read the code to find the bug the way you would in traditional software, you need a trace of what the model actually saw and said. Observability is the closest thing we have to a debugger for these systems. So, four ideas from one slide: self-consistency for extraction, embeddings and cosine similarity for retrieval, RAG over fine-tuning for personal data, and small-model classifiers plus tracing for safety and debugging. Keep all four in your back pocket, we're about to see two of them in action.\">\n    <div class=\"slide-pad\">\n      <div class=\"s-head\" style=\"margin-bottom:34px\">\n        <div class=\"row anim anim-1\"><span class=\"kicker-num\">00<\u002Fspan><span class=\"eyebrow on-light\">The Tools<\u002Fspan><\u002Fdiv>\n        <h2 class=\"headline anim anim-2\" style=\"font-size:60px\">Tech Stack - Phase 0<\u002Fh2>\n        <div class=\"lead anim anim-2\" style=\"font-size:24px;margin-top:4px;max-width:1500px\">Production-ready with Free tier stack for Rapid Prototyping<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"tools-grid\">\n\n        <!-- Core — Brainstorm & Development -->\n        <div class=\"tcluster span2 anim anim-3\">\n          <div class=\"tc-head\">\n            <div class=\"tc-ico\" style=\"background:var(--coral)\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v3m0 12v3M5.6 5.6l2.1 2.1m8.6 8.6 2.1 2.1M3 12h3m12 0h3M5.6 18.4l2.1-2.1m8.6-8.6 2.1-2.1\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"3.2\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n            <div><div class=\"tc-name\">Core<\u002Fdiv><div class=\"tc-sub\">Brainstorm &amp; Development<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"trow\"><div class=\"tlogo img\"><img src=\"6e96e240-17e0-4503-9759-692f244b9b81\" alt=\"Claude Desktop\"><\u002Fdiv><div><div class=\"tt\">Claude Desktop<\u002Fdiv><div class=\"td\">Brainstorming &amp; planning<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"trow\"><div class=\"tlogo img\"><img src=\"2964bba6-9d7e-488b-bc44-03d48e5407c3\" alt=\"VS Code\"><\u002Fdiv><div><div class=\"tt\">VS Code<\u002Fdiv><div class=\"td\">Development environment<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"trow\"><div class=\"tlogo img\" style=\"padding:0;overflow:hidden\"><img src=\"a73a2716-d54d-44f6-8ca2-c00374e9427c\" alt=\"Claude Design\"><\u002Fdiv><div><div class=\"tt\">Claude Design<\u002Fdiv><div class=\"td\">Design &amp; prototyping<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Infra -->\n        <div class=\"tcluster span2 anim anim-4\">\n          <div class=\"tc-head\">\n            <div class=\"tc-ico\" style=\"background:var(--navy)\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"16 18 22 12 16 6\"><\u002Fpolyline><polyline points=\"8 6 2 12 8 18\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n            <div><div class=\"tc-name\">Infra<\u002Fdiv><div class=\"tc-sub\">Code logic<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"trow\"><div class=\"tlogo img\"><img src=\"cde27cdb-8466-4bea-9548-41fbeb384b51\" alt=\"Next.js\"><\u002Fdiv><div><div class=\"tt\">Next.js 15<\u002Fdiv><div class=\"td\">Frontend<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"trow\"><div class=\"tlogo img\"><img src=\"8b6b4b5e-700e-4371-91b9-64bc0f11e444\" alt=\"FastAPI\"><\u002Fdiv><div><div class=\"tt\">FastAPI<\u002Fdiv><div class=\"td\">Serverless backend API<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"trow\"><div class=\"tlogo img\"><img src=\"4a6e732f-501d-495b-bbbc-d9b11e7d8eb9\" alt=\"Vercel\"><\u002Fdiv><div><div class=\"tt\">Vercel<\u002Fdiv><div class=\"td\">Deployment<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"trow\"><div class=\"tlogo img\"><img src=\"84333560-b922-4c18-8733-2a89a326c4b5\" alt=\"Supabase\"><\u002Fdiv><div><div class=\"tt\">Supabase<\u002Fdiv><div class=\"td\">Database &amp; Gmail Authentication<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Document Intelligence -->\n        <div class=\"tcluster span2 anim anim-5\">\n          <div class=\"tc-head\">\n            <div class=\"tc-ico\" style=\"background:var(--teal)\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><path d=\"M9 15h6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div><div class=\"tc-name\">Document Intelligence<\u002Fdiv><div class=\"tc-sub\">PDF &amp; lab extraction<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"trow\"><div class=\"tlogo img dark\" style=\"background:#1B3B39;border-color:#1B3B39\"><img src=\"44952a90-e224-44e0-bd67-5b40dca18536\" alt=\"LlamaParse\"><\u002Fdiv><div><div class=\"tt\">LlamaParse<\u002Fdiv><div class=\"td\">Business &amp; PDF extraction<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"trow\"><div class=\"tlogo img\"><img src=\"9908e52e-1c7e-4351-a6ac-0edbec73dd3c\" alt=\"GPT-4o\"><\u002Fdiv><div><div class=\"tt\">GPT-4o pipeline<\u002Fdiv><div class=\"td\">4-pass lab-metric extraction &amp; validation<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Data Ingestion -->\n        <div class=\"tcluster span2 anim anim-6\">\n          <div class=\"tc-head\">\n            <div class=\"tc-ico\" style=\"background:var(--blue)\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 12h-4l-3 9L9 3l-3 9H2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div><div class=\"tc-name\">Data Ingestion<\u002Fdiv><div class=\"tc-sub\">Wearables in<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"trow\"><div class=\"tlogo img\"><img src=\"e0b8b34b-4891-4fc8-aba1-edf4833aa783\" alt=\"Fitbit\"><\u002Fdiv><div><div class=\"tt\">Fitbit OAuth2 API<\u002Fdiv><div class=\"td\">Wearable data sync<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"trow\"><div class=\"tlogo\" style=\"background:#7FA9DC\">+<\u002Fdiv><div><div class=\"tt\">Per-device adapters <span class=\"tnote\">— same OAuth pattern<\u002Fspan><\u002Fdiv><div class=\"td\">Strava &amp; other wearables<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- AI & Retrieval -->\n        <div class=\"tcluster span2 anim anim-7\">\n          <div class=\"tc-head\">\n            <div class=\"tc-ico\" style=\"background:var(--coral)\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M12 3v3m0 12v3M3 12h3m12 0h3M5.6 5.6l2.1 2.1m8.6 8.6 2.1 2.1m0-12.8-2.1 2.1M7.7 16.3l-2.1 2.1\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div><div class=\"tc-name\">AI &amp; Retrieval Engine<\u002Fdiv><div class=\"tc-sub\">Conversation · insights · analytics<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"trow\"><div class=\"tlogo img\"><img src=\"ec675cd3-7fbd-44a0-b5f5-bab76cbf8afe\" alt=\"OpenRouter\"><\u002Fdiv><div><div class=\"tt\">OpenRouter<\u002Fdiv><div class=\"td\">LLM calls — chat, insights, analytics<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"trow\"><div class=\"tlogo img dark\"><img src=\"3e4da354-6872-4e4e-bf00-6d1018a93487\" alt=\"OpenAI embeddings\"><\u002Fdiv><div><div class=\"tt\">text-embedding-3-small <span class=\"tnote\">— OpenAI<\u002Fspan><\u002Fdiv><div class=\"td\">Embedding generation<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"trow\"><div class=\"tlogo\" style=\"background:#FF6B3D\">cos<\u002Fdiv><div><div class=\"tt\">Cosine similarity search<\u002Fdiv><div class=\"td\">Retrieval-augmented generation (RAG)<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Guardrails & Observability -->\n        <div class=\"tcluster span2 anim anim-8\">\n          <div class=\"tc-head\">\n            <div class=\"tc-ico\" style=\"background:var(--amber)\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div><div class=\"tc-name\">Guardrails &amp; Observability<\u002Fdiv><div class=\"tc-sub\">Safety net &amp; tracing<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"trow\"><div class=\"tlogo img dark\"><img src=\"5e769bb1-4e48-469a-a756-1efaa7f01ca5\" alt=\"GPT-4o-mini\"><\u002Fdiv><div><div class=\"tt\">GPT-4o-mini classifier<\u002Fdiv><div class=\"td\">Medical-query guardrail<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"trow\"><div class=\"tlogo img\"><img src=\"c4b54c6e-1a26-4ebb-8b40-687d6471635a\" alt=\"LangSmith\"><\u002Fdiv><div><div class=\"tt\">LangSmith<\u002Fdiv><div class=\"td\">LLM trace monitoring<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <div class=\"foot\"><div class=\"brand\"><\u002Fdiv><div>02 / 09<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SLIDE 4 — SYNERGY ============ -->\n  <section data-label=\"Business · Product · Code\" data-speaker-notes=\"Let's trace one feature end to end, it's easy to talk about grounding and retrieval in the abstract, I want you to see it land in an actual screen. Business layer, top block: the insight here is almost behavioral science, not technical, numbers don't change habits, direction does. Showing someone 3,257 steps and 2,093 kilocalories is just data, it doesn't tell them what to do. So the business goal is convert raw metrics into a next action. Code and AI layer, middle block: this is where that goal becomes a concrete model call. Look at the pseudocode, story equals llm of persona, data equals today of user, arrow, returns headline and an array of three actions. Two things worth unpacking. First, persona, the actual card has four toggles, Companion, Analyst, Coach, Clinical, that's persona-conditioned prompting, the same underlying data narrated in genuinely different voices depending on which instruction set you attach, without touching retrieval at all. It's a cheap, powerful lever, you're not retraining anything, just changing the frame the model is told to use. Second, structured output, the model isn't asked to write a paragraph, it's asked to return a specific shape, a headline plus exactly three actions. Constraining an LLM's output to a strict schema, rather than free text, is what makes it possible to reliably drop that output straight into a UI component without a human editing it first, often done with tool-calling or JSON-mode constraints in real systems. Product-fit layer, bottom block, Today's Story, sitting right on top of the dashboard, the highest-traffic, highest-discovery real estate in the app. An insight nobody sees is worthless, no matter how well-grounded it is. Look at the actual card, moderate readiness at the top, four persona tabs, a plain-language headline, a two-line synthesis, three concrete actions. Every word on that card traces back up through code to a business belief. Quick check for the room: if I asked you to change only the tone of this card, from encouraging to strictly clinical, what would you change in the system, the retrieval step or the prompt? Right, just the prompt, specifically the persona instruction, the retrieved facts don't change at all. That separation, facts retrieved once, presentation adapted many ways, is a pattern you'll reuse constantly once you build these systems yourselves.\">\n    <div class=\"slide-pad\">\n      <div class=\"s-head\">\n        <div class=\"row anim anim-1\"><span class=\"kicker-num\">04<\u002Fspan><span class=\"eyebrow on-light\">Business · Product · Code<\u002Fspan><\u002Fdiv>\n        <h2 class=\"headline anim anim-2\">One feature, traced from<br>intent to interface.<\u002Fh2>\n      <\u002Fdiv>\n\n      <div class=\"example\">\n        <div class=\"trace\">\n          <div class=\"trace-block b1 anim anim-3\">\n            <div class=\"tlayer\" style=\"color:var(--blue)\">Business<\u002Fdiv>\n            <div class=\"tbig\">Numbers don't change habits - direction does.<\u002Fdiv>\n            <div class=\"tdetail\" style=\"width: 810px\">A wall of steps and calories informs; it doesn't move behavior. The value is telling the user what to do next.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"trace-conn anim anim-3\" style=\"height: 20px; gap: 2px; padding: 12px\">↓<\u002Fdiv>\n          <div class=\"trace-block b2 anim anim-4\">\n            <div class=\"tlayer\" style=\"color:var(--coral-soft)\">Code &amp; AI<\u002Fdiv>\n            <div class=\"tbig\" style=\"color:#fff\">Directed LLM response<\u002Fdiv>\n            <div class=\"tdetail\" style=\"color:var(--blue-300)\">Reads the user data to return a concrete, doable call-to-action.<\u002Fdiv>\n            <div class=\"codeish\" style=\"margin-top:16px;font-family:'JetBrains Mono',monospace;font-size:16px;line-height:1.55;color:#C9F7E1;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:14px 16px\"><span style=\"color:#7FB0FF\">story<\u002Fspan> = llm(<span style=\"color:#FFB39B\">persona<\u002Fspan>,<br>&nbsp;&nbsp;data = today(user))<br>→ { headline, <span style=\"color:#FFB39B\">actions[3]<\u002Fspan> }<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"trace-conn anim anim-4\" style=\"height: 20px; gap: 2px; padding: 12px\">↓<\u002Fdiv>\n          <div class=\"trace-block b3 anim anim-5\">\n            <div class=\"tlayer\" style=\"color:var(--coral)\">Product fit<\u002Fdiv>\n            <div class=\"tbig\">“Today's Story” - a card to inspire people.<\u002Fdiv>\n            <div class=\"tdetail\">Sits on top of the dashboard, where discovery is highest.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"appcard anim anim-6\">\n          <div class=\"ac-top\">\n            <span class=\"ac-lbl\">TODAY'S STORY<\u002Fspan>\n            <span class=\"ac-ready\">Moderate readiness<\u002Fspan>\n            <span class=\"ac-ai\" style=\"font-size: 6px; opacity: 0\">✦ AI-generated<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"ac-personas\">\n            <span class=\"ac-persona\">Companion<\u002Fspan>\n            <span class=\"ac-persona on\">Analyst<\u002Fspan>\n            <span class=\"ac-persona\">Coach<\u002Fspan>\n            <span class=\"ac-persona\">Clinical<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"ac-head\">Small Steps, Big Energy Boost!<\u002Fdiv>\n          <div class=\"ac-body\">You took 3,257 steps, burned 2,093 kcal and covered 2.41 km across 45 active minutes - a strong base to build on.<\u002Fdiv>\n          <div class=\"ac-actions\">\n            <div class=\"ac-al\">ACTIONS THIS WEEK<\u002Fdiv>\n            <div class=\"ac-action\"><span class=\"an\">1<\u002Fspan><span class=\"at\">Take a 10-minute walk after lunch today.<\u002Fspan><\u002Fdiv>\n            <div class=\"ac-action\"><span class=\"an\">2<\u002Fspan><span class=\"at\">Add 500 steps to your daily average.<\u002Fspan><\u002Fdiv>\n            <div class=\"ac-action\"><span class=\"an\">3<\u002Fspan><span class=\"at\">Fit in one 15-minute home strength session.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><div class=\"brand\" style=\"opacity: 0\"><span class=\"dot\"><\u002Fspan> Null{Set}<\u002Fdiv><div>05 / 09<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SLIDE 6 — GUARDRAILS ============ -->\n  <section data-label=\"Guardrails &amp; Safety\" data-speaker-notes=\"If the last slide was about what the model says, this slide is about everything stopping it from saying the wrong thing. I'd argue this is the slide that separates a hackathon prototype from something you'd let your own family use. Four independent layers here, and notice independent, this is defense in depth, a security concept applied to AI safety, you never rely on one safeguard because any single layer can fail. Layer one, medical-query detection: before the main model ever sees a question like should I change my dose, a lightweight classifier, the GPT-4o-mini from the tools slide, intercepts it and reroutes to a fixed, safe response. This is a pre-generation guardrail, the risky question never reaches the generative model at all. Layer two, source attribution: every answer carries a badge, this specific lab panel, this date range of wearable data. This is a post-generation constraint tied directly to retrieval, because the answer was built from retrieved chunks, the system can always cite which chunks it used, that traceability only exists because of the RAG architecture, a model answering from pure parametric memory has no source to point to. Layer three, the persistent disclaimer, shows your data, not medical advice, under every answer, never dismissible. This is a UX-level guardrail, not a model-level one, it manages the human's interpretation of what the model did. Some of the most important guardrails are just honest, permanent copy. Layer four, refusal on missing data: if a fact isn't in the retrieved context, Saathi says so instead of guessing, the direct countermeasure to hallucination, when a model produces fluent, confident, but ungrounded output. In a shopping app that's an annoyance, in a health app it's a trust-destroying failure, so the system is designed to prefer I don't have that over a confident guess. Discussion question, real opinions please: which of these four layers would you trust the least to catch everything? Take a few answers. Most people say the classifier, and they're right to be suspicious, it can miss edge cases. That's exactly why there are three other layers behind it, even if the classifier misses something, the retrieval-bound, sourced, disclaimed answer coming out the other side is still constrained. No single layer needs to be perfect, that's the whole point of defense in depth.\">\n    <div class=\"slide-pad\">\n      <div class=\"s-head\">\n        <div class=\"row anim anim-1\"><span class=\"kicker-num\">05<\u002Fspan><span class=\"eyebrow on-light\">Guardrails &amp; Safety<\u002Fspan><\u002Fdiv>\n        <h2 class=\"headline anim anim-2\">A GenAI product is mostly<br>the safety net around the model.<\u002Fh2>\n      <\u002Fdiv>\n\n      <div class=\"guard-grid\">\n        <div class=\"guard amber anim anim-3\">\n          <div class=\"gh\"><div class=\"gi\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"><\u002Fpath><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"><\u002Fline><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fdiv><div class=\"gt\">Medical-query detection<\u002Fdiv><\u002Fdiv>\n          <div class=\"gp\">\"Should I change my dose?\" is caught before the model answers, and redirected, never answered.<\u002Fdiv>\n          <div class=\"mini-msg\">\n            <div class=\"ml\">⚠ Medical query detected<\u002Fdiv>\n            <div class=\"mt\">Saathi can show your data — your doctor decides the dose.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"guard teal anim anim-4\">\n          <div class=\"gh\"><div class=\"gi\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div class=\"gt\">Source attribution<\u002Fdiv><\u002Fdiv>\n          <div class=\"gp\">Every answer shows where it came from, so a claim can always be traced back to a record. It's illegal not to bind these.<\u002Fdiv>\n          <div class=\"src-badges\">\n            <span class=\"src-badge lab\">▤ Lipid panel · 28 Feb<\u002Fspan>\n            <span class=\"src-badge wear\">↗ Wearable · 28d<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"guard blue anim anim-5\">\n          <div class=\"gh\"><div class=\"gi\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><line x1=\"12\" y1=\"16\" x2=\"12\" y2=\"12\"><\u002Fline><line x1=\"12\" y1=\"8\" x2=\"12.01\" y2=\"8\"><\u002Fline><\u002Fsvg><\u002Fdiv><div class=\"gt\">Persistent disclaimer<\u002Fdiv><\u002Fdiv>\n          <div class=\"gp\">\"Shows your data · not medical advice\" sits under every answer - never hidden, never dismissible.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"guard coral anim anim-6\">\n          <div class=\"gh\"><div class=\"gi\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div class=\"gt\">Built via RAG, embedded on your data.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gp\">If the record doesn't contain it, Saathi says so instead of hallucinating a confident guess.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <div class=\"foot\" style=\"font-size: 24px\"><div class=\"brand\" style=\"opacity: 0\"><span class=\"dot\"><\u002Fspan> Null{Set}<\u002Fdiv><div>06 / 09<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SLIDE 7 — STATES ============ -->\n  <section data-label=\"Designing for Every State\" data-speaker-notes=\"Five small cards, one big idea: in a GenAI product the happy path, question in, perfect grounded answer out, is maybe sixty percent of real usage. The other forty percent is empty states, waiting states, refusals, and outright failures, and if you haven't designed those on purpose, users experience your product as broken even when the model is working exactly as intended. Empty, state one: before any data exists, don't show a blank dashboard, show a specific instruction, upload your lab report. Sounds obvious, but it's the single most common thing skipped in student projects, everyone designs the after-magic screen and nobody designs the before-any-data screen. Loading, state two: language model calls are not instant, a grounded, multi-step answer might take a few seconds, the honest move is to show the system is actually reading the user's data, not a generic spinner. This is a latency-management problem as much as a design one, inference over long retrieved context takes real wall-clock time, and users tolerate that much better when they understand what's happening. Blocked, state three, the guardrail from the last slide made visible, notice it isn't styled as an error, it's styled as a redirect, ask your doctor, with an arrow, the tone of a refusal matters almost as much as the fact of it. Current limitations, state four: handwritten reports can't be parsed yet, so say so plainly and immediately. Every extraction pipeline, no matter how many passes it runs, has a boundary, hiding that boundary and letting the user assume a silent failure is worse than stating it outright. Success, state five, and I'd argue it's the state most teams over-invest in relative to the other four, since it's the one everyone demos. Quick gut check: of these five, which do you think most first-time GenAI builders forget to design at all? Take answers. In my experience it's almost always current limitations, the honest here's-what-we-can't-do-yet state. Everyone wants to talk about capability, very few want to proactively advertise their system's boundaries. In a domain like health, telling someone what your system cannot do is just as trust-building as telling them what it can.\">\n    <div class=\"slide-pad\">\n      <div class=\"s-head\">\n        <div class=\"row anim anim-1\"><span class=\"kicker-num\">05<\u002Fspan><span class=\"eyebrow on-light\">DESIGNING FOR EVERY USER STATE<\u002Fspan><\u002Fdiv>\n        <h2 class=\"headline anim anim-2\">The product is the states,\nnot just the happy path.<\u002Fh2>\n      <\u002Fdiv>\n\n      <div class=\"states-row\">\n        <div class=\"state-card anim anim-3\">\n          <div class=\"snum\">S1<\u002Fdiv>\n          <div class=\"sname\">Empty<\u002Fdiv>\n          <div class=\"sdesc\">No data yet. Guide the first upload — never a blank screen.<\u002Fdiv>\n          <div class=\"demo\"><div style=\"font-size:30px;text-align:center;color:var(--gray-400)\">↑<\u002Fdiv><div style=\"font-size:15px;text-align:center;color:var(--gray-500)\">Upload your lab report<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"state-card anim anim-4\">\n          <div class=\"snum\">S2<\u002Fdiv>\n          <div class=\"sname\">Loading<\u002Fdiv>\n          <div class=\"sdesc\">Ideal User Experience. Show the model is working, set the expectation.<\u002Fdiv>\n          <div class=\"demo\" style=\"align-items:center\"><div class=\"dotspin\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv><div style=\"font-size:15px;color:var(--gray-500)\">Reading your data…<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"state-card accent anim anim-5\">\n          <div class=\"snum\">S3<\u002Fdiv>\n          <div class=\"sname\">Blocked<\u002Fdiv>\n          <div class=\"sdesc\">Caught a medical query. Redirect to the right person.<\u002Fdiv>\n          <div class=\"demo\" style=\"border-color:rgba(168,92,0,.3);background:rgba(168,92,0,.06)\"><div style=\"font-size:13px;font-weight:600;letter-spacing:.08em;color:var(--amber)\">⚠ MEDICAL QUERY<\u002Fdiv><div style=\"font-size:15px;color:var(--gray-600,#52617a)\">Ask your doctor →<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"state-card anim anim-6\">\n          <div class=\"snum\">S4<\u002Fdiv>\n          <div class=\"sname\">Current Limitations<\u002Fdiv>\n          <div class=\"sdesc\">Can't parse a handwritten scan? Always inform the user.<\u002Fdiv>\n          <div class=\"demo\" style=\"border-color:rgba(168,0,30,.25);background:rgba(168,0,30,.05)\"><div style=\"font-size:15px;color:#A8001E;line-height:1.35\">Handwritten reports can't be parsed yet - please upload a printed PDF.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"state-card anim anim-7\">\n          <div class=\"snum\">S5<\u002Fdiv>\n          <div class=\"sname\">Success<\u002Fdiv>\n          <div class=\"sdesc\">Answer delivered - with its sources attached.<\u002Fdiv>\n          <div class=\"demo\"><div class=\"skeleton-line\" style=\"width:90%\"><\u002Fdiv><div class=\"skeleton-line\" style=\"width:70%\"><\u002Fdiv><div style=\"margin-top:6px\"><span class=\"src-badge lab\" style=\"font-size:13px;padding:5px 10px\">▤ Lipid · 28 Feb<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:34px\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><div class=\"brand\" style=\"opacity: 0\"><span class=\"dot\"><\u002Fspan> Null{Set}<\u002Fdiv><div>07 / 09<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SLIDE 7 — PRODUCT-MARKET FIT ============ -->\n  <section data-label=\"Product-Market Fit\" data-speaker-notes=\"Last stop before we close: does any of this matter commercially, or is it just an engineering exercise? Look at the table. Ultrahuman, Oura, Whoop own wearable analysis brilliantly, but stop at the wrist, no lab-report memory, and talk-to-your-data is limited strictly to wearable metrics. Apple Health and Google Health Connect store lab data, but storage isn't memory, nothing correlates it, nothing narrates it back. Tata 1mg and Practo are transactional, booking and reports as a byproduct of a consult, not an ongoing memory layer. General-purpose assistants like ChatGPT or Claude can talk about your data if you paste it into a chat, but that context resets, it's not persistently grounded across sessions, and a general model with no retrieval constraint can still hallucinate confidently. The bottom row is really the whole pitch in one line, whole-family health memory. Every competitor in this table is built around one person's data, one modality, or one moment in time, none are built around a family as the unit, which, if you think about the actual job to be done, a parent tracking a child's growth chart alongside their own cardiology follow-up alongside a grandparent's medication list, is closer to how health actually gets managed in most households. I'll leave you with a genuinely open question: given the underlying technology here, RAG, embeddings, small guardrail models, is now genuinely commodity and cheap, as we saw on the tools slide, why do you think none of the big incumbents have shipped this unified, family-level, grounded memory product yet? Take a few answers, likely candidates: data-sharing and consent across family members is legally and product-wise hard, incumbents are organized around a single wearable or a single clinical workflow, not cross-source memory, and trust and liability concerns are much higher for an established brand than for a focused startup. That gap between the technology exists and nobody's shipped the unified version is usually exactly where a defensible product gets built, not because you invented a new model, but because you were willing to do the unglamorous integration and trust-building work a bigger, more cautious company wasn't.\">\n    <div class=\"slide-pad\">\n      <div class=\"s-head\">\n        <div class=\"row anim anim-1\"><span class=\"kicker-num\">07<\u002Fspan><span class=\"eyebrow on-light\">Product-Market Fit<\u002Fspan><\u002Fdiv>\n        <h2 class=\"headline anim anim-2\">Everyone solves a slice.<br>Saathi unifies the whole.<\u002Fh2>\n      <\u002Fdiv>\n\n      <div class=\"pmf\">\n        <div class=\"matrix anim anim-3\">\n          <div class=\"mcell mhead\">Capability<\u002Fdiv>\n          <div class=\"mcell mhead\">Ultrahuman / Oura / Whoop<\u002Fdiv>\n          <div class=\"mcell mhead\">Apple Health / Google Health Connect<\u002Fdiv>\n          <div class=\"mcell mhead\">Tata 1mg / Practo<\u002Fdiv>\n          <div class=\"mcell mhead\">ChatGPT / Claude<\u002Fdiv>\n          <div class=\"mcell mhead saathi\">Saathi<\u002Fdiv>\n\n          <div class=\"mcell rowlabel\">Wearable &amp; readiness analysis<\u002Fdiv>\n          <div class=\"mcell\"><span class=\"yes\">✓<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell\"><span class=\"yes\">✓<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell\"><span class=\"no\">—<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell\"><span class=\"no\">—<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell mcol-saathi\"><span class=\"yes\">✓<\u002Fspan><\u002Fdiv>\n\n          <div class=\"mcell rowlabel\">Lab-report memory <span id=\"extraction-note\" style=\"font-weight:400;color:var(--gray-500);font-size:16px;display:none\">(extraction + history)<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell\" style=\"color: rgb(168, 92, 0); font-size: 15px; font-weight: 600; text-align: center\"><span class=\"no\" style=\"font-size: 15px; color: rgb(168, 92, 0); line-height: 1.2\">Limited (individual only)<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell\"><span class=\"note\">Partial (storage only)<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell\"><span class=\"yes\">✓<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell\"><span class=\"no\" style=\"font-size: 15px; font-weight: 600; text-align: center; color: rgb(168, 92, 0); line-height: 1\">Limited (within chat/project)<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell mcol-saathi\"><span class=\"yes\">✓<\u002Fspan><\u002Fdiv>\n\n          <div class=\"mcell rowlabel\"><span>Talk to your <i>own<\u002Fi> data<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell\"><span class=\"note\">Limited (wearable only)<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell\"><span class=\"no\">—<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell\"><span class=\"no\">—<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell\"><span class=\"note\">Generic (can hallucinate)<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell mcol-saathi\"><span class=\"yes\">✓<\u002Fspan><\u002Fdiv>\n\n          <div class=\"mcell rowlabel\">Pre-appointment briefs &amp; digests<\u002Fdiv>\n          <div class=\"mcell\"><span class=\"no\">—<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell\"><span class=\"no\">—<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell\"><span class=\"no\">—<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell\"><span class=\"note\">Manual<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell mcol-saathi\"><span class=\"yes\">✓<\u002Fspan><\u002Fdiv>\n\n          <div class=\"mcell rowlabel hl\">Whole-family health memory<\u002Fdiv>\n          <div class=\"mcell\"><span class=\"no\">—<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell\"><span class=\"no\">—<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell\"><span class=\"note\">Partial (booking only)<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell\"><span class=\"no\">—<\u002Fspan><\u002Fdiv>\n          <div class=\"mcell mcol-saathi\"><span class=\"yes\">✓<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"pmf-punch anim anim-4\"><span style=\"color:#0f2d52\">Competitors ship a ring, a lab vault, or a chatbot.<\u002Fspan> <span class=\"hl\">Saathi is the only unified health memory built for the whole family.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><div class=\"brand\" style=\"opacity: 0\"><span class=\"dot\"><\u002Fspan> Null{Set}<\u002Fdiv><div>08 / 09<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SLIDE 8 — THANK YOU ============ -->\n  <section data-label=\"Thank You\" data-speaker-notes=\"Let's close the loop. Six ideas, and I'd genuinely like you to leave with all six, not just the product. Start from a human problem, not a tool. Many signals in, one grounded answer out, that's retrieval-augmented generation in practice. Trace intent all the way to interface, a business belief about behavior change literally became a persona toggle and a JSON schema. The safety net around a model matters more than the model, defense in depth, not one clever prompt. Design every state on purpose, especially the ones that admit a limitation. And build for the real unit of use, here, a family, not an individual. If you remember nothing else going into your own assignment, remember the principle on this slide: AI should help people, not replace them. Saathi shows you your data, your doctor still decides. That sentence is doing a lot of work, it's a design constraint, a legal boundary, and a trust strategy all at once, and I'd argue every GenAI capstone project in this course should be able to write its own one-sentence version of it before a single API call gets made. That's the case study. I'd rather spend the remaining time on your questions than my slides, so, what's unclear, what would you push back on, and if you're already scoping your own capstone, what's the one-sentence human problem you're starting from? Let's talk.\">\n    <div class=\"slide-pad dark s-thanks\">\n      <div class=\"eyebrow anim anim-1\" style=\"margin-bottom:30px\">CLOSING THOUGHTS<\u002Fdiv>\n      <h2 class=\"anim anim-2\">Thank <span class=\"hl\">you.<\u002Fspan><\u002Fh2>\n      <div class=\"principle anim anim-3\">AI should help people, not replace them.\nSaathi App shows your data, the doctor still decides.<\u002Fdiv>\n      <div class=\"recap anim anim-4\" style=\"opacity: 0\">\n        <div class=\"r\" style=\"opacity: 0\"><span class=\"n\">01<\u002Fspan>Human problem first<\u002Fdiv>\n        <div class=\"r\" style=\"opacity: 0\"><span class=\"n\">02<\u002Fspan>Many signals, one answer<\u002Fdiv>\n        <div class=\"r\" style=\"opacity: 0\"><span class=\"n\">03<\u002Fspan>Intent → interface<\u002Fdiv>\n        <div class=\"r\" style=\"opacity: 0\"><span class=\"n\">04<\u002Fspan>Safety net &gt; model<\u002Fdiv>\n        <div class=\"r\" style=\"opacity: 0\"><span class=\"n\">05<\u002Fspan>Design every state<\u002Fdiv>\n        <div class=\"r\" style=\"opacity: 0\"><span class=\"n\">06<\u002Fspan>Unified for families<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot on-dark\"><div class=\"brand\">Team Null{Set} · IITM BS · NPTEL<\u002Fdiv><div>09 / 09<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n<script src=\"a6a1167c-f9d4-4c63-b86f-3a998523d69e\"><\u002Fscript>\n\n<!-- ===== TWEAKS PANEL ===== -->\n<div id=\"tw-panel\" style=\"display:none;position:fixed;right:20px;bottom:20px;z-index:9999;width:308px;background:#fff;border:1.5px solid #0F2D52;border-radius:16px;box-shadow:0 16px 44px rgba(15,45,82,.30);padding:18px 18px 20px;font-family:'Inter',system-ui,sans-serif;color:#16243A\">\n  <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:4px\">\n    <div style=\"font-weight:800;font-size:20px;letter-spacing:-.01em\">Tweaks<\u002Fdiv>\n    <button id=\"tw-close\" aria-label=\"Close\" style=\"border:none;background:none;font-size:24px;line-height:1;cursor:pointer;color:#6B7280;padding:0 2px\">×<\u002Fbutton>\n  <\u002Fdiv>\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#9CA3AF;margin-bottom:16px\">Affects · Product-Market Fit<\u002Fdiv>\n\n  <label style=\"display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;font-weight:500;padding:6px 0\">\n    <input type=\"checkbox\" id=\"tw-extraction\" style=\"width:16px;height:16px;accent-color:#FF6B3D\">\n    Show “(extraction + history)”\n  <\u002Flabel>\n\n  <div style=\"margin-top:14px\">\n    <div style=\"display:flex;justify-content:space-between;font-size:14px;font-weight:500;margin-bottom:7px\">\n      <span>Column header size<\u002Fspan><span id=\"tw-hsize-val\" style=\"font-family:'JetBrains Mono',monospace;color:#1A56A0\">18px<\u002Fspan>\n    <\u002Fdiv>\n    <input type=\"range\" id=\"tw-hsize\" min=\"13\" max=\"24\" step=\"1\" value=\"18\" style=\"width:100%;accent-color:#FF6B3D\">\n  <\u002Fdiv>\n\n  <button id=\"tw-goto\" style=\"margin-top:18px;width:100%;border:1.5px solid #0F2D52;background:#0F2D52;color:#fff;border-radius:10px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit\">Jump to that slide<\u002Fbutton>\n<\u002Fdiv>\n\n<script>\n(function(){\n  var TWEAKS = /*EDITMODE-BEGIN*/{\n    \"showExtractionNote\": false,\n    \"headerSize\": 18\n  }/*EDITMODE-END*/;\n\n  var panel = document.getElementById('tw-panel');\n  var cbExtraction = document.getElementById('tw-extraction');\n  var slider = document.getElementById('tw-hsize');\n  var sliderVal = document.getElementById('tw-hsize-val');\n\n  function deck(){ return document.querySelector('deck-stage'); }\n\n  function apply(){\n    document.documentElement.style.setProperty('--mhead-size', TWEAKS.headerSize + 'px');\n    sliderVal.textContent = TWEAKS.headerSize + 'px';\n    slider.value = TWEAKS.headerSize;\n    cbExtraction.checked = !!TWEAKS.showExtractionNote;\n    var note = document.getElementById('extraction-note');\n    if(note){ note.style.display = TWEAKS.showExtractionNote ? '' : 'none'; }\n  }\n\n  function persist(edits){\n    try{ window.parent.postMessage({type:'__edit_mode_set_keys', edits: edits}, '*'); }catch(e){}\n  }\n\n  cbExtraction.addEventListener('change', function(){\n    TWEAKS.showExtractionNote = cbExtraction.checked;\n    apply(); persist({showExtractionNote: TWEAKS.showExtractionNote});\n  });\n  slider.addEventListener('input', function(){\n    TWEAKS.headerSize = parseInt(slider.value, 10);\n    apply(); persist({headerSize: TWEAKS.headerSize});\n  });\n  document.getElementById('tw-goto').addEventListener('click', function(){\n    var ds = deck(); if(ds && ds.goTo) ds.goTo(6);\n  });\n  document.getElementById('tw-close').addEventListener('click', function(){\n    panel.style.display = 'none';\n    try{ window.parent.postMessage({type:'__edit_mode_dismissed'}, '*'); }catch(e){}\n  });\n\n  window.addEventListener('message', function(e){\n    var d = e.data || {};\n    if(d.type === '__activate_edit_mode'){ panel.style.display = 'block'; var ds = deck(); if(ds && ds.goTo) ds.goTo(6); }\n    if(d.type === '__deactivate_edit_mode'){ panel.style.display = 'none'; }\n  });\n\n  apply();\n  try{ window.parent.postMessage({type:'__edit_mode_available'}, '*'); }catch(e){}\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
