  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"77786748-5ebc-4f81-a8dd-a8dc73bbe6a2\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"d225b353-6201-4a6b-acdb-35ec7e317c93\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"787e1108-fab9-475c-a549-c04d053ccb69\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"edd7c987-1196-4bc5-8ffb-c18cf72ae590\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"937d5514-8167-4bd3-8848-7966a2a6da7e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  deck-stage:not(:defined){visibility:hidden}\n\n  :root{\n    --navy:#0F2D52;\n    --navy-2:#0A2240;\n    --blue:#1A56A0;\n    --blue-300:#7FA9DC;\n    --teal:#0E7C7B;\n    --coral:#FF6B3D;        /* contrasting accent */\n    --coral-soft:#FF8A5F;\n    --amber:#A85C00;\n    --ink:#16243A;\n    --gray-50:#F9FAFB;\n    --gray-100:#F3F4F6;\n    --gray-200:#E5E7EB;\n    --gray-400:#9CA3AF;\n    --gray-500:#6B7280;\n    --gray-700:#374151;\n    --paper:#FBFCFE;\n  }\n\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:#000}\n\n  /* ---- shared slide canvas ---- */\n  section{\n    font-family:'Inter',system-ui,sans-serif;\n    color:var(--ink);\n    background:var(--paper);\n    overflow:hidden;\n  }\n  section *{box-sizing:border-box}\n\n  /* base type helpers */\n  .eyebrow{\n    font-family:'JetBrains Mono',monospace;\n    font-size:24px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;\n    color:var(--coral);\n  }\n  .eyebrow.on-light{color:var(--blue)}\n  .kicker-num{\n    font-family:'JetBrains Mono',monospace;\n    font-size:26px;font-weight:600;letter-spacing:.1em;color:var(--gray-400);\n  }\n  h1.title{font-size:104px;line-height:.98;font-weight:800;letter-spacing:-.03em;margin:0}\n  h2.headline{font-size:72px;line-height:1.02;font-weight:800;letter-spacing:-.025em;margin:0;color:var(--navy)}\n  .lead{font-size:32px;line-height:1.45;font-weight:400;color:var(--gray-700)}\n  .takeaway{\n    display:inline-flex;align-items:flex-start;gap:16px;\n    font-size:26px;line-height:1.4;font-weight:500;\n  }\n\n  /* layout frame */\n  .slide-pad{position:absolute;inset:0;padding:110px 130px;display:flex;flex-direction:column}\n  .slide-pad.dark{background:\n      radial-gradient(120% 90% at 88% 8%, rgba(255,107,61,.16), transparent 55%),\n      radial-gradient(90% 80% at 10% 100%, rgba(26,86,160,.45), transparent 60%),\n      var(--navy);\n    color:#fff;}\n  .slide-pad.dark h2.headline{color:#fff}\n\n  /* footer chrome */\n  .foot{\n    position:absolute;left:130px;right:130px;bottom:56px;\n    display:flex;align-items:center;justify-content:space-between;\n    font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:.04em;\n    color:var(--gray-400);\n  }\n  .foot.on-dark{color:rgba(255,255,255,.45)}\n  .foot .brand{display:flex;align-items:center;gap:12px;font-weight:500}\n  .foot .dot{width:9px;height:9px;border-radius:50%;background:var(--coral)}\n\n  /* pills / tags */\n  .pill{\n    display:inline-flex;align-items:center;gap:10px;\n    font-size:19px;font-weight:500;padding:9px 18px;border-radius:999px;\n    border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-700);\n  }\n  .pill .pdot{width:9px;height:9px;border-radius:50%;background:var(--teal)}\n\n  /* cards */\n  .card{\n    background:#fff;border:1.5px solid var(--gray-200);border-radius:24px;\n    padding:38px 40px;box-shadow:0 1px 2px rgba(0,0,0,.04);\n  }\n  .card.tinted{background:var(--gray-50)}\n  .card .c-eyebrow{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--gray-400)}\n  .card h3{font-size:30px;font-weight:700;letter-spacing:-.01em;margin:14px 0 0;color:var(--navy)}\n  .card p{font-size:22px;line-height:1.45;color:var(--gray-700);margin:14px 0 0}\n\n  /* ===== ENTRANCE ANIMATIONS ===== */\n  /* Base state is the VISIBLE end-state so content shows at rest, in print,\n     and under reduced-motion. We animate FROM hidden only when active. */\n  .anim{opacity:1}\n  .grow{opacity:1;transform-origin:left center}\n  @media (prefers-reduced-motion:no-preference){\n    [data-deck-active] .anim{animation:rise .62s cubic-bezier(.22,.61,.36,1) both}\n    [data-deck-active] .anim-1{animation-delay:.05s}\n    [data-deck-active] .anim-2{animation-delay:.14s}\n    [data-deck-active] .anim-3{animation-delay:.23s}\n    [data-deck-active] .anim-4{animation-delay:.32s}\n    [data-deck-active] .anim-5{animation-delay:.41s}\n    [data-deck-active] .anim-6{animation-delay:.50s}\n    [data-deck-active] .anim-7{animation-delay:.59s}\n    [data-deck-active] .anim-8{animation-delay:.68s}\n    [data-deck-active] .grow{animation:grow .7s cubic-bezier(.22,.61,.36,1) both}\n  }\n  @keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}\n  @keyframes grow{from{opacity:0}to{opacity:1}}\n\n  /* ===== SLIDE 1 — TITLE ===== */\n  .s-title{display:flex;flex-direction:column;justify-content:center;height:100%}\n  .s-title .logo-row{display:flex;align-items:center;gap:20px;margin-bottom:64px}\n  .s-title .logo-mark{\n    width:62px;height:62px;border-radius:18px;background:#fff;\n    display:flex;align-items:center;justify-content:center;color:var(--navy);\n  }\n  .s-title .logo-word{font-size:36px;font-weight:700;letter-spacing:-.01em}\n  .s-title h1.title{max-width:1500px}\n  .s-title h1.title .hl{color:var(--coral)}\n  .s-title .sub{font-size:30px;line-height:1.5;color:var(--blue-300);max-width:1080px;margin-top:46px;font-weight:400}\n  .s-title .ctx{\n    margin-top:60px;display:inline-flex;align-items:center;gap:18px;\n    font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:.05em;\n    color:rgba(255,255,255,.62);\n  }\n  .s-title .ctx .sep{width:7px;height:7px;border-radius:50%;background:var(--coral)}\n\n  /* ===== generic header for content slides ===== */\n  .s-head{display:flex;flex-direction:column;gap:20px;margin-bottom:54px}\n  .s-head .row{display:flex;align-items:center;gap:22px}\n\n  /* ===== SLIDE 2 — PROBLEM ===== */\n  .frag-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin-top:8px}\n  .frag{\n    border:1.5px dashed var(--gray-300,#D1D5DB);border-radius:22px;padding:30px 32px;\n    background:#fff;position:relative;\n  }\n  .frag .ico{font-size:30px}\n  .frag .lbl{font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-400);margin-top:18px}\n  .frag .txt{font-size:24px;font-weight:600;color:var(--navy);margin-top:6px;line-height:1.25}\n  .problem-punch{\n    margin-top:46px;font-size:34px;line-height:1.4;font-weight:500;color:var(--ink);max-width:1500px;\n  }\n  .problem-punch .hl{color:var(--coral);font-weight:700}\n\n  /* lesson strip (recurring teaching callout) */\n  .lesson{\n    display:flex;align-items:center;gap:22px;\n    border-left:6px solid var(--coral);\n    background:linear-gradient(90deg, rgba(255,107,61,.08), rgba(255,107,61,0));\n    padding:24px 30px;border-radius:0 16px 16px 0;\n  }\n  .lesson .tag{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--coral);white-space:nowrap}\n  .lesson .txt{font-size:25px;font-weight:500;line-height:1.35;color:var(--ink)}\n  .lesson.on-dark .txt{color:#fff}\n  .lesson.on-dark{background:linear-gradient(90deg, rgba(255,107,61,.18), rgba(255,107,61,0))}\n\n  /* ===== SLIDE 3 — PLAN ===== */\n  .plan-cols{display:grid;grid-template-columns:1fr 1fr;gap:64px;flex:1;align-items:start}\n  .scope-row{display:flex;gap:20px;align-items:flex-start;padding:22px 0;border-top:1.5px solid var(--gray-200)}\n  .scope-row:first-of-type{border-top:none}\n  .scope-row .yn{\n    width:42px;height:42px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;\n    font-size:24px;font-weight:700;\n  }\n  .scope-row .yn.do{background:rgba(14,124,123,.12);color:var(--teal)}\n  .scope-row .yn.dont{background:rgba(168,0,30,.1);color:#A8001E}\n  .scope-row .st{font-size:24px;line-height:1.35;color:var(--gray-700)}\n  .scope-row .st b{color:var(--navy);font-weight:700}\n  .surface-card{display:flex;gap:20px;align-items:center;padding:24px 26px;border-radius:18px;background:var(--gray-50);border:1.5px solid var(--gray-200);margin-bottom:16px}\n  .surface-card .si{width:52px;height:52px;border-radius:14px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}\n  .surface-card .sn{font-size:25px;font-weight:700;color:var(--navy)}\n  .surface-card .sd{font-size:19px;color:var(--gray-500);margin-top:2px}\n  .col-label{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-400);margin-bottom:26px}\n\n  /* ===== SLIDE 4 — SYNERGY ===== */\n  .synergy{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;flex:1;align-items:stretch;margin-top:10px}\n  .syn-col{padding:46px 40px;display:flex;flex-direction:column;position:relative}\n  .syn-col:not(:last-child)::after{\n    content:\"→\";position:absolute;right:-22px;top:64px;font-size:40px;color:var(--coral);z-index:2;font-weight:700;\n  }\n  .syn-col.c1{background:var(--gray-50);border-radius:24px 0 0 24px;border:1.5px solid var(--gray-200)}\n  .syn-col.c2{background:#fff;border-top:1.5px solid var(--gray-200);border-bottom:1.5px solid var(--gray-200)}\n  .syn-col.c3{background:var(--navy);border-radius:0 24px 24px 0}\n  .syn-col .layer{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}\n  .syn-col.c1 .layer{color:var(--blue)}\n  .syn-col.c2 .layer{color:var(--teal)}\n  .syn-col.c3 .layer{color:var(--coral-soft)}\n  .syn-col .q{font-size:24px;color:var(--gray-400);margin-top:6px;font-weight:500}\n  .syn-col.c3 .q{color:rgba(255,255,255,.5)}\n  .syn-col .big{font-size:33px;font-weight:700;line-height:1.18;letter-spacing:-.01em;margin-top:30px;color:var(--navy)}\n  .syn-col.c3 .big{color:#fff}\n  .syn-col .detail{font-size:20px;line-height:1.45;color:var(--gray-600,#52617a);margin-top:18px}\n  .syn-col.c3 .detail{color:var(--blue-300)}\n  .syn-col .codeish{\n    margin-top:22px;font-family:'JetBrains Mono',monospace;font-size:17px;line-height:1.6;\n    color:#9FE7C8;background:rgba(0,0,0,.25);border-radius:12px;padding:16px 18px;\n  }\n  .trace-block .codeish{margin-top:16px;font-family:'JetBrains Mono',monospace;font-size:16px;line-height:1.55;color:#C9F7E1;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:14px 16px}\n\n  /* ===== SLIDE 5 — GROUNDING ===== */\n  .ground-wrap{display:grid;grid-template-columns:1.05fr 1fr;gap:60px;flex:1;align
